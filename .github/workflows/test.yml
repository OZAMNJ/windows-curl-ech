name: Test ECH Wrapper

on:
  push:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  pull_request:

jobs:
  security:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for Exposed Secrets
        run: |
          if grep -Eirn "(ghp_[a-zA-Z0-9]{36}|AKIA[0-9A-Z]{16})" . ; then
            echo "::error::Exposed secrets detected in codebase. Failing build immediately."
            exit 1
          else
            echo "No exposed secrets detected."
          fi

  test:
    name: Test (${{ matrix.role }})
    needs: security
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            role: "Logic Validation"
          - os: windows-latest
            role: "MSYS2 Compatibility"
    
    defaults:
      run:
        shell: bash
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2 (Windows Only)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: >-
          base-devel
          curl
          git
          unzip

    - name: Install BATS Core
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          git clone https://github.com/bats-core/bats-core.git
          cd bats-core
          ./install.sh /usr/local
          cd ..
        else
          sudo apt-get update
          sudo apt-get install -y bats
        fi

    - name: Make Scripts Executable
      run: |
        chmod +x scripts/curl-ech-wrapper.sh
        chmod +x scripts/validate.sh
        chmod +x tests/mocks/curl

    - name: Run BATS Test Suite
      run: |
        bats tests/bats/ech-wrapper.bats

    - name: Run Validation Script
      run: |
        ./scripts/validate.sh
