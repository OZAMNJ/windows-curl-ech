name: Enterprise Build and Release

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          make
          cmake
          gcc
          git
          nasm
          autoconf
          automake
          libtool
          jq

    - name: Run Shellcheck
      shell: bash
      run: |
        # Optional: Run shellcheck on scripts if installed, or just simple bash checks
        # Assuming we only do basic bash syntax check for now if shellcheck isn't native
        bash -n scripts/build-curl-ech.sh
        bash -n scripts/run_curl_tests.sh

    - name: Build Curl and wolfSSL Reproducibly
      shell: msys2 {0}
      run: |
        chmod +x scripts/build-curl-ech.sh
        ./scripts/build-curl-ech.sh

    - name: Run Deterministic ECH Tests
      shell: msys2 {0}
      run: |
        chmod +x scripts/run_curl_tests.sh
        ./scripts/run_curl_tests.sh

    - name: Package Release
      shell: msys2 {0}
      run: |
        cd release_bin
        if [ ! -f "cacert.pem" ]; then
            curl -sS -L "https://curl.se/ca/cacert.pem" -o cacert.pem --fail
        fi
        zip -r ../curl-ech-windows-x64.zip ./*
        cd ..
        sha256sum curl-ech-windows-x64.zip > curl-ech-windows-x64.zip.sha256

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: curl-ech-windows-x64
        path: |
          curl-ech-windows-x64.zip
          curl-ech-windows-x64.zip.sha256
          release_bin/build-manifest.json
          curl_ech_results.csv
